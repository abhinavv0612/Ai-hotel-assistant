version: "3.9"

services:
  app:
    build: .
    container_name: hotel-ai-app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      - MODEL_VERSION=v1
    networks:
      - hotel-network

  postgres:
    image: postgres
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: hotel
    ports:
      - "5432:5432"
    networks:
      - hotel-network

  redis:
    image: redis
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - hotel-network

networks:
  hotel-network: